<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Customer — Electric Service Management</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <nav class="navbar">
        <span class="navbar-brand">⚡ Electric Service Management</span>
        <div>
            <span id="employeeName" style="margin-right:16px;opacity:.9"></span>
            <a href="dashboard.html">Dashboard</a>
            <a href="customer-management.html">Customer Management</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>
    <div class="container">
        <div class="card" style="max-width:700px;margin:0 auto">
            <div class="card-title">Add New Customer</div>
            <form id="addCustomerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name <span style="color:red">*</span></label>
                        <input type="text" id="fullName" placeholder="Enter full name" required>
                    </div>
                    <div class="form-group">
                        <label>ID Card / CCCD <span style="color:red">*</span></label>
                        <input type="text" id="idCard" placeholder="9 or 12 digits" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dateOfBirth">
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="">-- Select --</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="Enter full address">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number <span style="color:red">*</span></label>
                        <input type="text" id="phone" placeholder="0xxxxxxxxx" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="example@email.com">
                    </div>
                </div>
                <div style="display:flex;gap:10px;margin-top:8px">
                    <button type="submit" id="submitBtn" class="btn btn-primary">Save Customer</button>
                    <button type="button" class="btn btn-secondary" onclick="history.back()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/utils.js"></script>
    <script src="../js/model/CustomerModel.js"></script>
    <script src="../js/controller/CustomerAddController.js"></script>
</body>

</html>
