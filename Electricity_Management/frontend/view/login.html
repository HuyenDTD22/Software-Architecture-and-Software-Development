<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — Electric Service Management</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h1>⚡ Electric Service</h1>
            <p>Management System — Login</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary" style="width:100%;margin-top:8px">
                    Login
                </button>
            </form>
        </div>
    </div>
    <script src="../js/utils.js"></script>
    <script src="../js/model/EmployeeModel.js"></script>
    <script src="../js/controller/LoginController.js"></script>
</body>
</html>
