server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: servlet
  cloud:
    gateway:
      mvc:
        routes:
          - id: authen-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/auth/**

          - id: customer-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/customers/**

          - id: apartment-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/apartments/**

          - id: electric-pricing-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/electric-services/**

          - id: contract-service
            uri: http://localhost:8085
            predicates:
              - Path=/api/contracts/**